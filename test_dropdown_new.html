<!DOCTYPE html>
<html>
<head>
    <title>Test Department-Course Dropdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-6">Test Department-Course Dropdown</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Department</label>
                <select id="department" class="mt-1 block w-full border-gray-300 focus:border-indigo-500 focus:ring-indigo-500 rounded-md shadow-sm">
                    <option value="">Select Department</option>
                    <option value="College of Arts and Sciences">College of Arts and Sciences</option>
                    <option value="College of Business and Accountancy">College of Business and Accountancy</option>
                    <option value="College of Computer Studies">College of Computer Studies</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Course</label>
                <select id="course" class="mt-1 block w-full border-gray-300 focus:border-indigo-500 focus:ring-indigo-500 rounded-md shadow-sm">
                    <option value="">Select Course</option>
                    <!-- Courses will be populated dynamically -->
                </select>
            </div>
            
            <div id="department_display" class="mt-2 p-2 bg-blue-50 border border-blue-200 rounded-md text-sm text-blue-700" style="display: none;">
                <span id="department_text"></span>
            </div>
            
            <div id="course_display" class="mt-2 p-2 bg-purple-50 border border-purple-200 rounded-md text-sm text-purple-700" style="display: none;">
                <span id="course_text"></span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Test page loaded');
            
            const departmentCourses = {
                'College of Arts and Sciences': [
                    'Bachelor of Arts in Communication',
                    'Bachelor of Arts in Political Science',
                    'Bachelor of Arts in Psychology',
                    'Bachelor of Science in Psychology',
                    'Bachelor of Arts in English Language',
                    'Bachelor of Arts in History'
                ],
                'College of Business and Accountancy': [
                    'Bachelor of Science in Accountancy',
                    'Bachelor of Science in Accounting Information System',
                    'Bachelor of Science in Business Administration',
                    'Bachelor of Science in Entrepreneurship',
                    'Bachelor of Science in Marketing Management',
                    'Bachelor of Science in Human Resource Management'
                ],
                'College of Computer Studies': [
                    'Bachelor of Science in Computer Science',
                    'Bachelor of Science in Information Technology',
                    'Bachelor of Science in Information Systems',
                    'Bachelor of Science in Computer Engineering',
                    'Associate in Computer Technology'
                ]
            };
            
            const departmentSelect = document.getElementById('department');
            const courseSelect = document.getElementById('course');
            
            console.log('Department select:', departmentSelect);
            console.log('Course select:', courseSelect);
            
            if (departmentSelect && courseSelect) {
                departmentSelect.addEventListener('change', function() {
                    console.log('Department changed to:', this.value);
                    
                    // Clear current courses
                    courseSelect.innerHTML = '<option value="">Select Course</option>';
                    
                    // Update department display
                    const departmentDisplay = document.getElementById('department_display');
                    const departmentText = document.getElementById('department_text');
                    
                    if (departmentDisplay && departmentText) {
                        if (this.value) {
                            departmentText.textContent = '📚 Selected: ' + this.value;
                            departmentDisplay.style.display = 'block';
                        } else {
                            departmentDisplay.style.display = 'none';
                        }
                    }
                    
                    // Populate courses based on department
                    if (this.value && departmentCourses[this.value]) {
                        console.log('Courses found:', departmentCourses[this.value]);
                        const courses = departmentCourses[this.value];
                        courses.forEach(course => {
                            const option = document.createElement('option');
                            option.value = course;
                            option.textContent = course;
                            courseSelect.appendChild(option);
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>
